<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 297 210" preserveAspectRatio="xMidYMid slice">
  <title>Castillo de Lorca — Fortaleza del Sol (acuarela minimalista)</title>
  <defs>
    <!-- Watercolor edge roughening -->
    <filter id="wc" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="3" seed="7" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="3.5"/>
    </filter>
    <filter id="wc-rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="3" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="2"/>
    </filter>
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <!-- Vibrant sunset sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE9B0"/>
      <stop offset="35%" stop-color="#FFBA6A"/>
      <stop offset="70%" stop-color="#E86448"/>
      <stop offset="100%" stop-color="#8E2426"/>
    </linearGradient>

    <!-- Sun -->
    <radialGradient id="sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFF8D4"/>
      <stop offset="35%" stop-color="#FFD464" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#FF8E3A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FF6A28" stop-opacity="0"/>
    </radialGradient>

    <!-- Hill gradient -->
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6E2A14"/>
      <stop offset="100%" stop-color="#2A0C04"/>
    </linearGradient>
  </defs>

  <!-- Sky wash -->
  <rect width="297" height="210" fill="url(#sky)"/>

  <!-- Watercolor blooms (color spots) -->
  <ellipse cx="50" cy="42" rx="70" ry="42" fill="#FFD464" opacity="0.55" filter="url(#bloom)"/>
  <ellipse cx="275" cy="30" rx="55" ry="30" fill="#FFB260" opacity="0.45" filter="url(#bloom)"/>
  <ellipse cx="280" cy="185" rx="80" ry="45" fill="#8E2426" opacity="0.5" filter="url(#bloom)"/>
  <ellipse cx="20" cy="195" rx="55" ry="32" fill="#3A0E06" opacity="0.45" filter="url(#bloom)"/>
  <ellipse cx="155" cy="205" rx="90" ry="25" fill="#6E2A14" opacity="0.4" filter="url(#bloom)"/>

  <!-- Sun halo -->
  <circle cx="188" cy="86" r="62" fill="url(#sun)"/>
  <!-- Sun core -->
  <circle cx="188" cy="86" r="26" fill="#FFF2B8" opacity="0.8" filter="url(#soft)"/>

  <!-- Distant mountains -->
  <path d="M 0 148 Q 45 135 90 142 Q 140 132 180 140 Q 230 138 297 146 L 297 210 L 0 210 Z"
        fill="#8B3820" opacity="0.45" filter="url(#wc)"/>

  <!-- Mid hill -->
  <path d="M 0 168 Q 40 156 85 162 Q 135 150 175 156 Q 225 160 297 158 L 297 210 L 0 210 Z"
        fill="#5A1E0A" opacity="0.55" filter="url(#wc)"/>

  <!-- Main hill where castle sits -->
  <path d="M 0 188 Q 35 178 70 182 Q 110 170 145 155 Q 185 148 225 158 Q 260 168 297 180 L 297 210 L 0 210 Z"
        fill="url(#hill)" opacity="0.78" filter="url(#wc)"/>

  <!-- Castle silhouette (minimalist: wall + two towers + main Torre Alfonsina) -->
  <g opacity="0.88" filter="url(#wc-rough)">
    <!-- Main wall -->
    <rect x="140" y="138" width="88" height="16" fill="#1E0603"/>
    <!-- Left small tower -->
    <rect x="146" y="120" width="14" height="18" fill="#1E0603"/>
    <!-- Central keep (Torre Alfonsina) -->
    <rect x="172" y="92" width="24" height="46" fill="#1E0603"/>
    <!-- Right tower -->
    <rect x="208" y="116" width="14" height="22" fill="#1E0603"/>
    <!-- Battlements (merlons) on wall -->
    <rect x="142" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="148" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="154" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="162" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="168" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="200" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="206" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="212" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="218" y="134" width="3" height="5" fill="#1E0603"/>
    <rect x="224" y="134" width="3" height="5" fill="#1E0603"/>
    <!-- Merlons on main keep -->
    <rect x="173" y="88" width="4" height="5" fill="#1E0603"/>
    <rect x="181" y="88" width="4" height="5" fill="#1E0603"/>
    <rect x="189" y="88" width="4" height="5" fill="#1E0603"/>
    <!-- Merlons on side towers -->
    <rect x="147" y="116" width="3" height="5" fill="#1E0603"/>
    <rect x="154" y="116" width="3" height="5" fill="#1E0603"/>
    <rect x="209" y="112" width="3" height="5" fill="#1E0603"/>
    <rect x="216" y="112" width="3" height="5" fill="#1E0603"/>
  </g>

  <!-- Warm overall wash -->
  <rect width="297" height="210" fill="#FFE9B0" opacity="0.06"/>
</svg>
